name: Update Cached Data

on:
  schedule:
    # Every Monday at 10 AM UTC (7 AM Brazil time)
    - cron: '0 10 * * 1'
    # 1st of each month at 11 AM UTC — ensures BIS RPPI (30-day cue) is caught monthly
    - cron: '0 11 1 * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force re-run all targets (ignore cached pipeline state)'
        type: boolean
        default: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Setup R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::targets
            any::tarchetypes
            any::cli
            any::readr
            any::dplyr
            any::purrr
            any::remotes

      - name: Install package
        run: Rscript -e 'remotes::install_local(".", dependencies = TRUE)'

      # Restore the targets store from the previous run so that tar_cue_age()
      # and format="file" targets can correctly detect what is stale.
      # Skipped when force_run is true so all targets re-run unconditionally.
      - name: Restore targets store
        if: ${{ github.event.inputs.force_run != 'true' }}
        uses: actions/cache/restore@v4
        with:
          path: _targets
          key: targets-store-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            targets-store-${{ runner.os }}-

      - name: Create required directories
        run: mkdir -p data-raw/cache_output _targets

      - name: Run targets pipeline
        run: |
          Rscript -e '
            library(targets)

            options(timeout = 600)
            tar_make(callr_function = NULL)

            meta <- tar_meta(fields = c("name", "error"))
            errored <- meta[!is.na(meta$error), ]
            if (nrow(errored) > 0) {
              cli::cli_alert_warning("{nrow(errored)} target(s) failed:")
              for (i in seq_len(nrow(errored))) {
                cli::cli_alert_danger("  {errored$name[i]}: {errored$error[i]}")
              }
            }
            cli::cli_alert_success("Pipeline run complete")
          '

      # Always save the updated store, even on failure, so the next run
      # can resume from the correct state.
      - name: Save targets store
        if: always()
        uses: actions/cache/save@v4
        with:
          path: _targets
          key: targets-store-${{ runner.os }}-${{ github.run_id }}

      - name: Validate cached data files
        id: validate
        run: |
          Rscript -e '
            cache_dir <- "data-raw/cache_output"
            all_files <- list.files(cache_dir, pattern = "\\.rds$", full.names = TRUE)
            data_files <- all_files[!grepl("_metadata\\.rds$", all_files)]

            if (length(data_files) == 0) {
              cli::cli_inform("No new files produced — all targets up to date")
              quit(status = 0)
            }

            cli::cli_inform("Validating {length(data_files)} file(s)...")
            failed <- character(0)

            for (f in data_files) {
              fname <- basename(f)
              fsize <- file.size(f)
              if (fsize < 200) {
                cli::cli_alert_danger("{fname}: too small ({fsize} bytes) — removing")
                failed <- c(failed, f)
              } else {
                tryCatch({
                  d <- readRDS(f)
                  if (is.data.frame(d)) {
                    cli::cli_alert_success("{fname}: {nrow(d)} rows, {fsize} bytes")
                  } else {
                    cli::cli_alert_success("{fname}: {class(d)[1]}, {fsize} bytes")
                  }
                }, error = function(e) {
                  cli::cli_alert_danger("{fname}: unreadable — {e$message}")
                  failed <<- c(failed, f)
                })
              }
            }

            if (length(failed) > 0) {
              cli::cli_alert_warning("Removing {length(failed)} invalid file(s)")
              file.remove(failed)
            }

            remaining <- list.files(cache_dir, pattern = "\\.rds$")
            remaining <- remaining[!grepl("_metadata\\.rds$", remaining)]
            if (length(remaining) == 0) {
              cli::cli_alert_danger("All data files failed validation!")
              quit(status = 1)
            }
            cli::cli_alert_success("{length(remaining)} file(s) ready for upload")
          '
          count=$(find data-raw/cache_output -name "*.rds" ! -name "*_metadata.rds" 2>/dev/null | wc -l | tr -d ' ')
          echo "file_count=$count" >> "$GITHUB_OUTPUT"

      - name: Create or update cache-latest release
        if: steps.validate.outputs.file_count != '0'
        run: |
          if gh release view cache-latest > /dev/null 2>&1; then
            echo "Release cache-latest already exists"
          else
            gh release create cache-latest \
              --title "Latest Cached Data" \
              --notes "Automatically updated cached datasets. Updated by the data pipeline." \
              --prerelease
          fi

      - name: Clean up stale release assets
        if: steps.validate.outputs.file_count != '0'
        run: |
          stale_assets=(
            "abecip.csv.gz" "abecip.rds"
            "abrainc.csv.gz" "abrainc.rds"
            "bcb_series.csv.gz" "bcb_realestate.csv.gz"
            "cbic.csv.gz" "fgv_ibre.csv.gz"
            "rppi_sale.csv.gz" "rppi_rent.csv.gz"
            "property_records.csv.gz" "secovi_sp.csv.gz"
            "secovi_sp_202408.csv.gz" "bis_detailed.rds"
            "bis_selected.csv.gz" "b3_stocks.csv.gz"
          )
          for asset in "${stale_assets[@]}"; do
            gh release delete-asset cache-latest "$asset" --yes 2>/dev/null \
              && echo "Deleted $asset" || true
          done

          metadata_assets=$(gh release view cache-latest --json assets \
            --jq '.assets[].name' 2>/dev/null | grep '_metadata\.rds$' || true)
          for asset in $metadata_assets; do
            gh release delete-asset cache-latest "$asset" --yes 2>/dev/null \
              && echo "Deleted $asset" || true
          done

      - name: Upload cached datasets to GitHub release
        if: steps.validate.outputs.file_count != '0'
        run: |
          uploaded=0
          for file in data-raw/cache_output/*.rds; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")
            [[ "$filename" == *"_metadata.rds" ]] && continue
            echo "Uploading $filename..."
            gh release upload cache-latest "$file" --clobber
            uploaded=$((uploaded + 1))
          done
          echo "Uploaded $uploaded file(s)"

      - name: Report completion
        if: always()
        run: |
          count="${{ steps.validate.outputs.file_count || '0' }}"
          if [ "${{ job.status }}" == "success" ]; then
            if [ "$count" -gt 0 ]; then
              echo "::notice::Pipeline completed — $count dataset(s) updated"
            else
              echo "::notice::Pipeline completed — all datasets up to date, nothing uploaded"
            fi
          else
            echo "::error::Pipeline failed — check logs for details"
            exit 1
          fi
